<!DOCTYPE html>
<html>
<head>
    <title>AAKRUTI Evaluation - 3DEXPERIENCE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="../common/scripts/UWA_W3C_EE.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; }
        .main-header { display: flex; align-items: center; justify-content: space-between; background: #f4f7fb; padding: 10px 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); sticky; top: 0; z-index: 100; }
        .container { display: flex; gap: 20px; padding: 20px; }
        .section { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); flex: 1; }
        input, select, textarea { width: 100%; padding: 8px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .score-input { width: 60px; text-align: center; }
        .submit-btn { background: #28a745; color: #fff; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; }
        .modal-content { background:#fff; padding:30px; border-radius:12px; text-align:center; }
    </style>
</head>
<body>
<div class="main-header">
    <button onclick="window.location.href='index.html'" style="background:#007bff; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">🏠 Home</button>
    <h2 style="color:#FF0000; margin:0;">Evaluation Form</h2>
    <img src="https://github.com/surajgajbhiye15/index/blob/main/Aakruti%20Logo.png?raw=true" height="40">
</div>

<form id="evalForm">
    <div class="container">
        <div class="section">
            <h3>Team Details</h3>
            <label>Country</label>
            <select id="teamCountry" name="country" required><option value="">Select...</option><option>India</option><option>USA</option></select>
            <label>Team ID</label><input type="text" id="teamId" name="teamId" required>
            <label>Team Name</label><input type="text" name="teamName" required>
            <label>Theme</label><select name="theme"><option>Healthcare</option><option>Environment</option></select>
        </div>
        <div class="section">
            <h3>Scoring (0-5)</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>Theme <input type="number" class="score-input" name="A1" min="0" max="5" required></div>
                <div>Creativity <input type="number" class="score-input" name="A2" min="0" max="5" required></div>
                <div>CAD <input type="number" class="score-input" name="B1" min="0" max="5" required></div>
                <div>Pitch <input type="number" class="score-input" name="D2" min="0" max="5" required></div>
            </div>
            <hr>
            <label>Evaluator Name</label><input type="text" name="evaluatorName" required>
            <button type="submit" class="submit-btn">Submit to Google Sheets</button>
        </div>
    </div>
</form>

<div id="successModal" class="modal"><div class="modal-content"><h2>Submitted Successfully!</h2><button onclick="window.location.href='index.html'" style="padding:10px 20px; background:#0056D2; color:#fff; border:none; border-radius:6px; cursor:pointer;">Back to Dashboard</button></div></div>

<script>
require(['DS/WAFData/WAFData', 'DS/Widget/Widget'], function (WAFData, Widget) {
    var Eval = {
        saveUrl: "https://script.google.com/macros/s/AKfycby_dbR0ym16e44bbPSkYFpMef35fBbDDshYmgpLZeBtqwlrcBvRDIegMK53Em8Moyol/exec",
        checkUrl: "https://opensheet.elk.sh/1hbsjsYNuA9FulSPBrh4wkBoHpE-ExbMG5mb0FPPUZes/Sheet1",
        
        onLoad: function() {
            new Choices('#teamCountry', { searchEnabled: true });
            document.getElementById('evalForm').onsubmit = this.handleSubmit.bind(this);
        },
        handleSubmit: function(e) {
            e.preventDefault();
            var _this = this;
            const tId = document.getElementById('teamId').value;
            
            // 1. Check for Duplicate
            WAFData.proxifiedRequest(this.checkUrl, {
                method: 'GET', type: 'json',
                onComplete: function(data) {
                    if (data.some(r => r["Team ID"] == tId)) { alert("Duplicate Team ID!"); }
                    else { _this.saveData(); }
                }
            });
        },
        saveData: function() {
            const formData = new FormData(document.getElementById('evalForm'));
            const payload = {};
            formData.forEach((value, key) => { payload[key] = value; });

            WAFData.authenticatedRequest(this.saveUrl, {
                method: 'POST',
                data: payload,
                onComplete: function() { document.getElementById('successModal').style.display = 'flex'; },
                onFailure: function() { alert("Submission failed. Check your Google Script permissions."); }
            });
        }
    };
    widget.addEvent('onLoad', Eval.onLoad.bind(Eval));
});
</script>
</body>
</html>
